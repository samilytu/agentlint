stages:
  - test
  - release
  - publish
  - mirror

variables:
  GIT_DEPTH: "0"
  PNPM_VERSION: "10"

changeset-required:
  stage: test
  image: node:24
  before_script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
  script:
    - node scripts/check-changeset.mjs
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: node:24
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - pnpm run release-status
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
    - (cd packages/cli && npm pack --dry-run)
    - (cd packages/mcp && npm pack --dry-run)
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^(cli|mcp)-v/

prepare-release:
  stage: release
  image: node:24
  needs: ["test"]
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - node scripts/prepare-release.mjs
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

tag-release:
  stage: release
  image: node:24
  needs: ["test", "prepare-release"]
  script:
    - node scripts/tag-release.mjs
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"

publish-mcp:
  stage: publish
  needs: ["test"]
  image: node:24
  environment:
    name: production
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
    - pnpm run release-status
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
  script:
    - |
      VERSION=$(node -p 'require("./packages/mcp/package.json").version')
      test "$CI_COMMIT_TAG" = "mcp-v$VERSION"
    - npm install -g npm@latest
    - sh scripts/publish-package.sh packages/mcp "mcp-v$VERSION"
  rules:
    - if: $CI_COMMIT_TAG =~ /^mcp-v/

publish-cli:
  stage: publish
  needs: ["test"]
  image: node:24
  environment:
    name: production
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
    - pnpm run release-status
    - pnpm run typecheck
    - pnpm run lint
    - pnpm run test
  script:
    - |
      VERSION=$(node -p 'require("./packages/cli/package.json").version')
      test "$CI_COMMIT_TAG" = "cli-v$VERSION"
    - npm install -g npm@latest
    - sh scripts/publish-package.sh packages/cli "cli-v$VERSION"
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli-v/

mirror-cli-tag:
  stage: mirror
  needs: ["publish-cli"]
  image: node:24
  script:
    - node scripts/mirror-tag.mjs
  rules:
    - if: $CI_COMMIT_TAG =~ /^cli-v/

mirror-mcp-tag:
  stage: mirror
  needs: ["publish-mcp"]
  image: node:24
  script:
    - node scripts/mirror-tag.mjs
  rules:
    - if: $CI_COMMIT_TAG =~ /^mcp-v/
