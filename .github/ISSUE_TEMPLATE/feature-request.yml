name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: "Which area does this relate to?"
      options:
        - "Analysis / Scoring"
        - "MCP Server"
        - "CLI"
        - "Custom Rules / Plugins"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve? What's the use case?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How would you like this to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any alternative approaches you've considered?"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Any other context, screenshots, or references?"
