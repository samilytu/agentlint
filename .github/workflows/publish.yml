name: Release Verify

on:
  push:
    tags:
      - "cli-v*"
      - "mcp-v*"

permissions:
  contents: read

jobs:
  release-verify:
    name: Verify tagged release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

      - name: Validate package-scoped tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == cli-v* ]]; then
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            test "$TAG" = "cli-v$VERSION"
            (cd packages/cli && npm pack --dry-run)
          elif [[ "$TAG" == mcp-v* ]]; then
            VERSION=$(node -p "require('./packages/mcp/package.json').version")
            test "$TAG" = "mcp-v$VERSION"
            (cd packages/mcp && npm pack --dry-run)
          else
            echo "Unsupported tag: $TAG"
            exit 1
          fi
